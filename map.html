<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Interactieve kaart</title>

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIINfQw3fAUTcfv5PoJbM3r4ZbM2d2sw0U="
    crossorigin=""
  />

  <style>
    html, body {
      height: 100%;
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    #map {
      height: 100vh;
      width: 100%;
    }

    .panel {
      position: absolute;
      z-index: 1000;
      top: 16px;
      left: 16px;
      max-width: 320px;
      background: white;
      padding: 14px 16px;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
      line-height: 1.4;
    }

    .panel h1 {
      font-size: 18px;
      margin: 0 0 8px;
    }

    .panel p {
      margin: 0 0 10px;
      font-size: 14px;
    }

    .panel button {
      width: 100%;
      border: 0;
      border-radius: 8px;
      padding: 10px 12px;
      cursor: pointer;
      background: #1f2937;
      color: white;
      font-weight: 600;
    }

    .panel button:hover {
      background: #111827;
    }

    .leaflet-popup-content button {
      margin-top: 8px;
      border: 0;
      border-radius: 6px;
      padding: 7px 9px;
      cursor: pointer;
      background: #dc2626;
      color: white;
    }
  </style>
</head>
<body>
  <div class="panel">
    <h1>Interactieve kaart</h1>
    <p>Klik op de kaart om een marker te maken. Geef de marker een naam. Klik daarna op een marker om de naam te bekijken.</p>
    <button id="clearMarkers">Alle markers verwijderen</button>
  </div>

  <div id="map"></div>

  <!-- Leaflet JS -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <script>
    const STORAGE_KEY = "mijn-interactieve-kaart-markers";

    // Startpositie: Nederland. Pas deze aan naar je eigen gebied.
    const map = L.map("map").setView([52.1326, 5.2913], 7);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
    }).addTo(map);

    let markers = [];

    function escapeHtml(text) {
      return text
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function saveMarkers() {
      const data = markers.map(item => ({
        name: item.name,
        lat: item.marker.getLatLng().lat,
        lng: item.marker.getLatLng().lng
      }));

      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function getPopupContent(name, markerId) {
      return `
        <strong>${escapeHtml(name)}</strong><br>
        <button onclick="deleteMarker(${markerId})">Marker verwijderen</button>
      `;
    }

    function addMarker(lat, lng, name) {
      const markerId = Date.now() + Math.floor(Math.random() * 100000);
      const marker = L.marker([lat, lng], { draggable: true }).addTo(map);

      const markerItem = { id: markerId, name, marker };
      markers.push(markerItem);

      marker.bindPopup(getPopupContent(name, markerId));

      marker.on("dragend", saveMarkers);
      marker.openPopup();

      saveMarkers();
    }

    window.deleteMarker = function(markerId) {
      const markerItem = markers.find(item => item.id === markerId);
      if (!markerItem) return;

      map.removeLayer(markerItem.marker);
      markers = markers.filter(item => item.id !== markerId);
      saveMarkers();
    };

    function loadMarkers() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (!saved) return;

      try {
        const data = JSON.parse(saved);
        data.forEach(item => {
          if (item.name && typeof item.lat === "number" && typeof item.lng === "number") {
            addMarker(item.lat, item.lng, item.name);
          }
        });
      } catch (error) {
        console.error("Markers konden niet worden geladen:", error);
      }
    }

    map.on("click", event => {
      const name = prompt("Naam van deze marker:");

      if (!name || !name.trim()) {
        return;
      }

      addMarker(event.latlng.lat, event.latlng.lng, name.trim());
    });

    document.getElementById("clearMarkers").addEventListener("click", () => {
      const confirmed = confirm("Weet je zeker dat je alle markers wilt verwijderen?");
      if (!confirmed) return;

      markers.forEach(item => map.removeLayer(item.marker));
      markers = [];
      saveMarkers();
    });

    loadMarkers();
  </script>
</body>
</html>
