<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Item Catalogus</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Item Catalogus</h1>
    <p>Kies een categorie en filter items op naam, categorie, type of materiaal.</p>
  </header>

  <section class="categories" id="categoryIcons"></section>

  <section class="filters">
    <input id="searchInput" type="text" placeholder="Zoek op naam..." />

    <select id="categoryFilter">
      <option value="">Alle categorieën</option>
    </select>

    <select id="typeFilter">
      <option value="">Alle types</option>
    </select>

    <select id="materialFilter">
      <option value="">Alle materialen</option>
    </select>
  </section>

  <main>
    <h2 id="activeTitle">Alle items</h2>
    <div class="item-grid" id="itemList"></div>
  </main>

  <script src="script.js"></script>
</body>
</html>
