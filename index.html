<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elite Autos Catalog</title>
  <style>
    :root {
      --bg: #0b1220;
      --panel: #121b2e;
      --panel-2: #19243b;
      --text: #e7edf7;
      --muted: #9fb0cc;
      --accent: #3b82f6;
      --accent-2: #1d4ed8;
      --success: #16a34a;
      --border: #273349;
      --shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #09101d 0%, #0b1220 100%);
      color: var(--text);
    }

    .app {
      max-width: 1400px;
      margin: 0 auto;
      padding: 28px 20px 48px;
    }

    .topbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 22px;
    }

    .title-wrap h1 {
      margin: 0;
      font-size: clamp(1.6rem, 2vw, 2.4rem);
    }

    .title-wrap p {
      margin: 8px 0 0;
      color: var(--muted);
    }

    .toolbar {
      display: grid;
      gap: 14px;
      margin-bottom: 22px;
    }

    .search-box input {
      width: 100%;
      background: var(--panel);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      outline: none;
      font-size: 0.98rem;
    }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .filter-btn {
      border: 1px solid var(--border);
      background: #0f1a2d;
      color: #c7d5eb;
      border-radius: 999px;
      padding: 10px 14px;
      cursor: pointer;
      transition: 0.2s ease;
      font-weight: 600;
    }

    .filter-btn:hover,
    .filter-btn.active {
      background: linear-gradient(180deg, var(--accent), var(--accent-2));
      color: white;
      border-color: transparent;
      transform: translateY(-1px);
    }

    .catalog-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
    }

    .car-card {
      background: linear-gradient(180deg, rgba(25, 36, 59, 0.95), rgba(18, 27, 46, 0.98));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    }

    .car-card:hover {
      transform: translateY(-4px);
      border-color: #3f5274;
      box-shadow: 0 18px 38px rgba(0, 0, 0, 0.45);
    }

    .car-image {
      width: 100%;
      aspect-ratio: 16 / 10;
      object-fit: cover;
      background: #0a101d;
      display: block;
    }

    .car-body {
      padding: 14px 14px 16px;
    }

    .car-name {
      margin: 0 0 10px;
      font-size: 1.05rem;
    }

    .badge-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .badge {
      font-size: 0.77rem;
      padding: 6px 10px;
      border-radius: 999px;
      font-weight: 700;
    }

    .price {
      background: rgba(22, 163, 74, 0.16);
      color: #7cf0a5;
      border: 1px solid rgba(22, 163, 74, 0.35);
    }

    .type {
      background: rgba(59, 130, 246, 0.16);
      color: #8fc2ff;
      border: 1px solid rgba(59, 130, 246, 0.35);
    }

    .year {
      background: rgba(148, 163, 184, 0.14);
      color: #dce5f5;
      border: 1px solid rgba(148, 163, 184, 0.22);
    }

    .empty-state {
      background: var(--panel);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      padding: 28px;
      text-align: center;
      color: var(--muted);
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(4, 8, 15, 0.74);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 999;
    }

    .modal.open { display: flex; }

    .modal-card {
      width: min(920px, 100%);
      background: linear-gradient(180deg, #162137 0%, #0f1728 100%);
      border: 1px solid var(--border);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.5);
    }

    .modal-grid {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
    }

    .modal-media {
      min-height: 100%;
      background: #0a101d;
    }

    .modal-media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .modal-content {
      padding: 22px;
    }

    .modal-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
    }

    .modal-title {
      margin: 0;
      font-size: 1.65rem;
    }

    .close-btn {
      background: transparent;
      color: #dbe7fb;
      border: 1px solid var(--border);
      border-radius: 12px;
      width: 40px;
      height: 40px;
      cursor: pointer;
      font-size: 1.1rem;
    }

    .modal-price {
      margin: 12px 0 8px;
      color: #7cf0a5;
      font-size: 1.3rem;
      font-weight: 800;
    }

    .modal-description {
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 18px;
    }

    .details-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .detail-box {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 16px;
      padding: 12px;
    }

    .detail-label {
      display: block;
      color: var(--muted);
      font-size: 0.82rem;
      margin-bottom: 6px;
    }

    .detail-value {
      font-size: 1rem;
      font-weight: 700;
    }

    .modal-actions {
      margin-top: 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .action-btn {
      border: 0;
      border-radius: 14px;
      padding: 12px 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .primary-btn {
      background: linear-gradient(180deg, var(--accent), var(--accent-2));
      color: white;
    }

    .secondary-btn {
      background: #1a2740;
      color: #dbe7fb;
      border: 1px solid var(--border);
    }

    @media (max-width: 820px) {
      .modal-grid {
        grid-template-columns: 1fr;
      }

      .modal-media {
        max-height: 320px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="title-wrap">
        <h1>Elite Autos Catalog</h1>
        <p>Browse inventory, filter by car type, and click any vehicle for full details.</p>
      </div>
    </div>

    <div class="toolbar">
      <div class="search-box">
        <input id="searchInput" type="text" placeholder="Search by model, brand, or type..." />
      </div>
      <div class="filters" id="filterBar"></div>
    </div>

    <div class="catalog-grid" id="catalogGrid"></div>
  </div>

  <div class="modal" id="detailsModal" aria-hidden="true">
    <div class="modal-card">
      <div class="modal-grid">
        <div class="modal-media">
          <img id="modalImage" src="" alt="Selected car image" />
        </div>
        <div class="modal-content">
          <div class="modal-top">
            <div>
              <h2 class="modal-title" id="modalTitle"></h2>
              <div class="badge-row" id="modalBadges"></div>
            </div>
            <button class="close-btn" id="closeModalBtn" aria-label="Close">✕</button>
          </div>

          <div class="modal-price" id="modalPrice"></div>
          <p class="modal-description" id="modalDescription"></p>

          <div class="details-grid" id="modalSpecs"></div>

          <div class="modal-actions">
            <button class="action-btn primary-btn">Request Quote</button>
            <button class="action-btn secondary-btn">Save Vehicle</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const cars = [
      {
        id: 1,
        name: "Panto",
        brand: "Benefactor",
        type: "Compacts",
        price: 6000,
        fuel: "?",
        seats: 2,
        Klasse: "C",
        Kofferbak: "100 KG",
        image: "https://images.unsplash.com/photo-1549399542-7e3f8b79c341?auto=format&fit=crop&w=1200&q=80",
        description: "A city-friendly compact with low running costs, modern styling, and great fuel economy for daily driving."
      },
      {
        id: 2,
        name: "Falcon S Touring",
        brand: "Falcon Auto",
        type: "Sedan",
        year: 2023,
        price: 26900,
        fuel: "Gasoline",
        transmission: "Automatic",
        seats: 5,
        mileage: "8,100 km",
        color: "Midnight Blue",
        engine: "2.0L Turbo",
        image: "https://images.unsplash.com/photo-1553440569-bcc63803a83d?auto=format&fit=crop&w=1200&q=80",
        description: "A refined sedan with a premium interior, smooth ride, and advanced driver assistance features."
      },
      {
        id: 3,
        name: "TrailMax X",
        brand: "NorthRidge",
        type: "SUV",
        year: 2025,
        price: 38400,
        fuel: "Diesel",
        transmission: "Automatic",
        seats: 7,
        mileage: "2,400 km",
        color: "Pearl White",
        engine: "2.2L AWD",
        image: "https://images.unsplash.com/photo-1519641471654-76ce0107ad1b?auto=format&fit=crop&w=1200&q=80",
        description: "A spacious SUV designed for families and road trips, with seven seats and confident all-terrain capability."
      },
      {
        id: 4,
        name: "Velocity GT",
        brand: "Vortex",
        type: "Sports",
        year: 2022,
        price: 55900,
        fuel: "Gasoline",
        transmission: "Manual",
        seats: 2,
        mileage: "15,700 km",
        color: "Racing Red",
        engine: "3.0L Twin Turbo",
        image: "https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?auto=format&fit=crop&w=1200&q=80",
        description: "A fast, sharp-handling sports coupe built for drivers who want performance and presence."
      },
      {
        id: 5,
        name: "CargoPro L2",
        brand: "MetroVan",
        type: "Van",
        year: 2024,
        price: 31200,
        fuel: "Diesel",
        transmission: "Automatic",
        seats: 3,
        mileage: "6,200 km",
        color: "Arctic White",
        engine: "2.0L Turbo Diesel",
        image: "https://images.unsplash.com/photo-1489824904134-891ab64532f1?auto=format&fit=crop&w=1200&q=80",
        description: "A practical cargo van with a large loading area, perfect for delivery businesses and service fleets."
      },
      {
        id: 6,
        name: "Summit Rover",
        brand: "Frontier",
        type: "Off-Road",
        year: 2021,
        price: 44750,
        fuel: "Gasoline",
        transmission: "Automatic",
        seats: 5,
        mileage: "28,900 km",
        color: "Desert Sand",
        engine: "3.5L V6 4x4",
        image: "https://images.unsplash.com/photo-1503376780353-7e6692767b70?auto=format&fit=crop&w=1200&q=80",
        description: "A rugged 4x4 designed for outdoor adventures, with high ground clearance and durable off-road hardware."
      },
      {
        id: 7,
        name: "EcoZip",
        brand: "Voltive",
        type: "Compact",
        year: 2025,
        price: 22900,
        fuel: "Electric",
        transmission: "Automatic",
        seats: 5,
        mileage: "900 km",
        color: "Silver Frost",
        engine: "EV 62 kWh",
        image: "https://images.unsplash.com/photo-1502877338535-766e1452684a?auto=format&fit=crop&w=1200&q=80",
        description: "A small electric hatchback with quick acceleration, clean design, and excellent efficiency for urban use."
      },
      {
        id: 8,
        name: "Executive LX",
        brand: "Regal",
        type: "Sedan",
        year: 2024,
        price: 41800,
        fuel: "Hybrid",
        transmission: "Automatic",
        seats: 5,
        mileage: "4,600 km",
        color: "Obsidian Black",
        engine: "2.5L Hybrid",
        image: "https://images.unsplash.com/photo-1503736334956-4c8f8e92946d?auto=format&fit=crop&w=1200&q=80",
        description: "A premium executive sedan with upscale comfort, quiet cabin insulation, and long-distance efficiency."
      }
    ];

    const catalogGrid = document.getElementById("catalogGrid");
    const filterBar = document.getElementById("filterBar");
    const searchInput = document.getElementById("searchInput");
    const detailsModal = document.getElementById("detailsModal");
    const closeModalBtn = document.getElementById("closeModalBtn");

    let activeType = "All";
    let searchTerm = "";

    const types = ["All", ...new Set(cars.map(car => car.type))];

    function formatPrice(value) {
      return new Intl.NumberFormat("en-US", {
        style: "currency",
        currency: "EUR",
        maximumFractionDigits: 0
      }).format(value);
    }

    function renderFilters() {
      filterBar.innerHTML = "";
      types.forEach(type => {
        const btn = document.createElement("button");
        btn.className = `filter-btn ${type === activeType ? "active" : ""}`;
        btn.textContent = type;
        btn.addEventListener("click", () => {
          activeType = type;
          renderFilters();
          renderCatalog();
        });
        filterBar.appendChild(btn);
      });
    }

    function getFilteredCars() {
      return cars.filter(car => {
        const matchesType = activeType === "All" || car.type === activeType;
        const query = searchTerm.trim().toLowerCase();
        const matchesSearch = !query || [car.name, car.brand, car.type, car.fuel, String(car.year)]
          .join(" ")
          .toLowerCase()
          .includes(query);
        return matchesType && matchesSearch;
      });
    }

    function renderCatalog() {
      const filteredCars = getFilteredCars();
      catalogGrid.innerHTML = "";

      if (!filteredCars.length) {
        catalogGrid.innerHTML = `
          <div class="empty-state">
            <h3>No vehicles found</h3>
            <p>Try another search or choose a different vehicle type.</p>
          </div>
        `;
        return;
      }

      filteredCars.forEach(car => {
        const card = document.createElement("article");
        card.className = "car-card";
        card.innerHTML = `
          <img class="car-image" src="${car.image}" alt="${car.name}" />
          <div class="car-body">
            <h3 class="car-name">${car.name}</h3>
            <div class="badge-row">
              <span class="badge price">${formatPrice(car.price)}</span>
              <span class="badge type">${car.type}</span>
              <span class="badge year">${car.year}</span>
            </div>
          </div>
        `;
        card.addEventListener("click", () => openModal(car));
        catalogGrid.appendChild(card);
      });
    }

    function openModal(car) {
      document.getElementById("modalImage").src = car.image;
      document.getElementById("modalImage").alt = car.name;
      document.getElementById("modalTitle").textContent = `${car.brand} ${car.name}`;
      document.getElementById("modalPrice").textContent = formatPrice(car.price);
      document.getElementById("modalDescription").textContent = car.description;

      document.getElementById("modalBadges").innerHTML = `
        <span class="badge type">${car.type}</span>
        <span class="badge year">${car.year}</span>
        <span class="badge price">${car.fuel}</span>
      `;

      const specs = [
        ["Brand", car.brand],
        ["Type", car.type],
        ["Klasse", car.klasse],
        ["Kofferbak", car.kofferbak],
        ["Seats", car.seats],
        ["Fuel", car.fuel]
      ];

      document.getElementById("modalSpecs").innerHTML = specs.map(([label, value]) => `
        <div class="detail-box">
          <span class="detail-label">${label}</span>
          <span class="detail-value">${value}</span>
        </div>
      `).join("");

      detailsModal.classList.add("open");
      detailsModal.setAttribute("aria-hidden", "false");
    }

    function closeModal() {
      detailsModal.classList.remove("open");
      detailsModal.setAttribute("aria-hidden", "true");
    }

    searchInput.addEventListener("input", (event) => {
      searchTerm = event.target.value;
      renderCatalog();
    });

    closeModalBtn.addEventListener("click", closeModal);
    detailsModal.addEventListener("click", (event) => {
      if (event.target === detailsModal) closeModal();
    });
    window.addEventListener("keydown", (event) => {
      if (event.key === "Escape") closeModal();
    });

    renderFilters();
    renderCatalog();
  </script>
</body>
</html>
