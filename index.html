<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wasbeer Crafting Catalogus</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header>
      <h1>Wasbeer Crafting Catalogus</h1>
      <h2>Item Catalogus</h2>
    </header>

    <section class="category-grid" id="categoryGrid"></section>

    <section class="filters">
  <input id="searchInput" type="text" placeholder="Zoek op naam..." />

  <select id="categoryFilter">
    <option value="">Alle categorieën</option>
  </select>

  <select id="typeFilter">
    <option value="">Alle types</option>
  </select>

  <select id="materialFilter">
    <option value="">Alle materialen</option>
  </select>

  <select id="tagFilter">
    <option value="">Alle tags</option>
  </select>

  <input id="amountInput" type="number" min="1" value="1" placeholder="Aantal..." />
</section>

    <h2 id="listTitle">Alle items</h2>

    <section class="items-grid" id="itemsGrid"></section>
  </main>

  <script src="script.js"></script>
</body>
</html>
