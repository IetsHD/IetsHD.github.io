<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Interactieve Map</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>Interactieve map</h1>
      <p>Markers staan in <code>markers.js</code>. Klik op de kaart om coördinaten te zien.</p>
    </div>
    <label class="search">
      <span>Zoeken</span>
      <input id="searchInput" type="search" placeholder="Zoek marker..." />
    </label>
  </header>

  <main>
    <aside class="sidebar">
      <h2>Markers</h2>
      <div id="markerList" class="marker-list"></div>
    </aside>

    <section class="map-panel">
      <div class="controls" aria-label="Map bediening">
        <button id="zoomIn" type="button">+</button>
        <button id="zoomOut" type="button">−</button>
        <button id="resetMap" type="button">Reset</button>
      </div>

      <div id="mapViewport" class="map-viewport">
        <div id="mapContent" class="map-content">
          <img id="mapImage" src="map.png" alt="Map" draggable="false" />
          <div id="markerLayer" class="marker-layer"></div>
        </div>
      </div>
    </section>
  </main>

  <script src="markers.js"></script>
  <script src="script.js"></script>
</body>
</html>
