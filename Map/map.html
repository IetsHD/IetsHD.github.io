<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Interactieve GTA Map App</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIINfQw3fAUTcfv5PoJbM3r4ZbM2d2sw0U="
    crossorigin=""
  />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <aside>
      <h1>GTA Map App</h1>
      <p class="help">
        Klik op de map om een marker te plaatsen. Geef de marker een naam. Klik op een marker om de naam te bekijken, te wijzigen of te verwijderen.
      </p>

      <div class="button-row">
        <button id="fitMap">Kaart centreren</button>
        <button id="exportMarkers" class="secondary">Markers exporteren</button>
        <button id="importMarkers" class="secondary">Markers importeren</button>
        <button id="clearMarkers" class="danger">Alle markers verwijderen</button>
      </div>

      <h2 class="marker-list-title">Markers</h2>
      <ul id="markerList"></ul>
    </aside>

    <main>
      <div id="map"></div>
    </main>
  </div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="markers.js"></script>
</body>
</html>
