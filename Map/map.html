<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Interactieve GTA Map App</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIINfQw3fAUTcfv5PoJbM3r4ZbM2d2sw0U="
    crossorigin=""
  />

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
    }

    #app {
      height: 100vh;
      width: 100vw;
      display: grid;
      grid-template-columns: 320px 1fr;
    }

    aside {
      background: #111827;
      color: white;
      padding: 18px;
      overflow-y: auto;
      border-right: 1px solid rgba(255, 255, 255, 0.08);
    }

    main {
      position: relative;
      min-width: 0;
    }

    #map {
      height: 100%;
      width: 100%;
      background: #0ea5c6;
    }

    h1 {
      font-size: 22px;
      margin: 0 0 8px;
    }

    .help {
      margin: 0 0 18px;
      color: #cbd5e1;
      font-size: 14px;
      line-height: 1.5;
    }

    .button-row {
      display: grid;
      gap: 10px;
      margin-bottom: 18px;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 11px 12px;
      cursor: pointer;
      font-weight: 700;
      color: white;
      background: #2563eb;
    }

    button:hover {
      filter: brightness(1.08);
    }

    button.secondary {
      background: #374151;
    }

    button.danger {
      background: #dc2626;
    }

    .marker-list-title {
      font-size: 15px;
      margin: 18px 0 10px;
      color: #e5e7eb;
    }

    #markerList {
      display: grid;
      gap: 8px;
      padding: 0;
      margin: 0;
      list-style: none;
    }

    .marker-item {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      padding: 10px;
      display: grid;
      gap: 8px;
    }

    .marker-item strong {
      font-size: 14px;
    }

    .marker-item .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .marker-item button {
      padding: 8px;
      font-size: 12px;
    }

    .empty {
      color: #94a3b8;
      font-size: 14px;
      line-height: 1.5;
    }

    .leaflet-popup-content {
      min-width: 170px;
    }

    .popup-title {
      font-weight: 800;
      font-size: 15px;
      margin-bottom: 8px;
    }

    .popup-actions {
      display: grid;
      gap: 7px;
      margin-top: 10px;
    }

    .popup-actions button {
      width: 100%;
      padding: 8px 10px;
      font-size: 12px;
      border-radius: 8px;
    }

    @media (max-width: 800px) {
      #app {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
      }

      aside {
        max-height: 260px;
        border-right: 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <aside>
      <h1>GTA Map App</h1>
      <p class="help">
        Klik op de map om een marker te plaatsen. Geef de marker een naam. Klik op een marker om de naam te bekijken, te wijzigen of te verwijderen.
      </p>

      <div class="button-row">
        <button id="fitMap">Kaart centreren</button>
        <button id="exportMarkers" class="secondary">Markers exporteren</button>
        <button id="importMarkers" class="secondary">Markers importeren</button>
        <button id="clearMarkers" class="danger">Alle markers verwijderen</button>
      </div>

      <h2 class="marker-list-title">Markers</h2>
      <ul id="markerList"></ul>
    </aside>

    <main>
      <div id="map"></div>
    </main>
  </div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <script>
    const STORAGE_KEY = "gta-map-app-markers-v1";

    // Gebruik exact dezelfde bestandsnaam als in je repository.
    const MAP_IMAGE = "Map.png";

    // Afmetingen van jouw geüploade kaartafbeelding.
    // Als je later een andere kaart gebruikt, pas deze waarden aan.
    const MAP_WIDTH = 1536;
    const MAP_HEIGHT = 1536;

    const map = L.map("map", {
      crs: L.CRS.Simple,
      minZoom: -2,
      maxZoom: 4,
      zoomControl: true,
      attributionControl: false
    });

    const bounds = [[0, 0], [MAP_HEIGHT, MAP_WIDTH]];

    L.imageOverlay(MAP_IMAGE, bounds).addTo(map);
    map.fitBounds(bounds);
    map.setMaxBounds(bounds);

    let markers = [];

    const markerList = document.getElementById("markerList");

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function saveMarkers() {
      const data = markers.map(item => ({
        id: item.id,
        name: item.name,
        x: item.marker.getLatLng().lng,
        y: item.marker.getLatLng().lat
      }));

      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      renderMarkerList();
    }

    function popupContent(item) {
      return `
        <div class="popup-title">${escapeHtml(item.name)}</div>
        <div>X: ${Math.round(item.marker.getLatLng().lng)} | Y: ${Math.round(item.marker.getLatLng().lat)}</div>
        <div class="popup-actions">
          <button onclick="renameMarker('${item.id}')">Naam wijzigen</button>
          <button class="danger" onclick="deleteMarker('${item.id}')">Marker verwijderen</button>
        </div>
      `;
    }

    function refreshPopup(item) {
      item.marker.bindPopup(popupContent(item));
    }

    function addMarker(y, x, name, id = crypto.randomUUID()) {
      const marker = L.marker([y, x], {
        draggable: true
      }).addTo(map);

      const item = { id, name, marker };
      markers.push(item);

      refreshPopup(item);

      marker.on("dragend", () => {
        refreshPopup(item);
        saveMarkers();
      });

      marker.openPopup();
      saveMarkers();
    }

    function renderMarkerList() {
      markerList.innerHTML = "";

      if (markers.length === 0) {
        markerList.innerHTML = `<li class="empty">Nog geen markers. Klik op de kaart om je eerste marker te maken.</li>`;
        return;
      }

      markers.forEach(item => {
        const li = document.createElement("li");
        li.className = "marker-item";

        const latlng = item.marker.getLatLng();

        li.innerHTML = `
          <strong>${escapeHtml(item.name)}</strong>
          <small>X: ${Math.round(latlng.lng)} | Y: ${Math.round(latlng.lat)}</small>
          <div class="actions">
            <button type="button" data-action="go">Ga naar</button>
            <button type="button" data-action="delete" class="danger">Verwijder</button>
          </div>
        `;

        li.querySelector('[data-action="go"]').addEventListener("click", () => {
          map.setView(item.marker.getLatLng(), 1);
          item.marker.openPopup();
        });

        li.querySelector('[data-action="delete"]').addEventListener("click", () => {
          deleteMarker(item.id);
        });

        markerList.appendChild(li);
      });
    }

    window.renameMarker = function(id) {
      const item = markers.find(markerItem => markerItem.id === id);
      if (!item) return;

      const newName = prompt("Nieuwe naam voor deze marker:", item.name);
      if (!newName || !newName.trim()) return;

      item.name = newName.trim();
      refreshPopup(item);
      item.marker.openPopup();
      saveMarkers();
    };

    window.deleteMarker = function(id) {
      const item = markers.find(markerItem => markerItem.id === id);
      if (!item) return;

      map.removeLayer(item.marker);
      markers = markers.filter(markerItem => markerItem.id !== id);
      saveMarkers();
    };

    function loadMarkers() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (!saved) {
        renderMarkerList();
        return;
      }

      try {
        const data = JSON.parse(saved);

        data.forEach(item => {
          if (
            item.name &&
            typeof item.x === "number" &&
            typeof item.y === "number"
          ) {
            addMarker(item.y, item.x, item.name, item.id || crypto.randomUUID());
          }
        });
      } catch (error) {
        console.error("Markers konden niet worden geladen:", error);
        renderMarkerList();
      }
    }

    map.on("click", event => {
      const name = prompt("Naam van deze marker:");
      if (!name || !name.trim()) return;

      addMarker(event.latlng.lat, event.latlng.lng, name.trim());
    });

    document.getElementById("fitMap").addEventListener("click", () => {
      map.fitBounds(bounds);
    });

    document.getElementById("clearMarkers").addEventListener("click", () => {
      if (!confirm("Weet je zeker dat je alle markers wilt verwijderen?")) return;

      markers.forEach(item => map.removeLayer(item.marker));
      markers = [];
      saveMarkers();
    });

    document.getElementById("exportMarkers").addEventListener("click", async () => {
      const data = markers.map(item => ({
        name: item.name,
        x: Math.round(item.marker.getLatLng().lng),
        y: Math.round(item.marker.getLatLng().lat)
      }));

      const json = JSON.stringify(data, null, 2);

      try {
        await navigator.clipboard.writeText(json);
        alert("Markers zijn gekopieerd naar je klembord.");
      } catch {
        prompt("Kopieer deze marker-data:", json);
      }
    });

    document.getElementById("importMarkers").addEventListener("click", () => {
      const json = prompt("Plak hier je marker-data JSON:");
      if (!json) return;

      try {
        const data = JSON.parse(json);
        if (!Array.isArray(data)) throw new Error("Geen lijst");

        data.forEach(item => {
          if (item.name && typeof item.x === "number" && typeof item.y === "number") {
            addMarker(item.y, item.x, item.name);
          }
        });
      } catch {
        alert("Deze JSON kon niet worden geïmporteerd.");
      }
    });

    loadMarkers();
  </script>
</body>
</html>
